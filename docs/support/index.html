<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持 EchoBird · 打赏开发者 / Support EchoBird</title>
    <meta name="description"
        content="如果 EchoBird 帮到你,请 EchoBird 团队喝杯咖啡。Paddle 安全结账,支持信用卡 / Apple Pay / Google Pay / 微信支付。">
    <link rel="icon" href="../icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <style>
        :root {
            --bg: #121212;
            --bg2: #1A1A1C;
            --bg3: #222224;
            --bg-card: rgba(28, 28, 30, 0.85);
            --neon: #D97757;
            --neon2: #E89F7A;
            --neon-soft: rgba(217, 119, 87, 0.12);
            --neon-line: rgba(217, 119, 87, 0.22);
            --white: #ECECEE;
            --text: #B5B5B7;
            --dim: #7A7A7C;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.12);
            --sans: 'Inter', -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Orbitron', var(--mono);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px);
            background-size: 24px 24px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 80%);
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            z-index: 0;
            top: -240px;
            left: 50%;
            transform: translateX(-50%);
            width: 720px;
            height: 480px;
            background: rgba(217, 119, 87, 0.08);
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: rgba(18, 18, 18, 0.78);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo img { width: 26px; height: 26px; border-radius: 6px; }
        .nav-logo span {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 15px;
            color: var(--neon);
            letter-spacing: 0.5px;
        }

        .nav-r { display: flex; align-items: center; gap: 18px; }

        .nav-back {
            color: var(--dim);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            font-family: var(--mono);
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--neon); }

        /* ── Language toggle ── */
        .toggle {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
            font-family: var(--mono);
            font-size: 12px;
        }
        .toggle button {
            background: transparent;
            border: none;
            color: var(--dim);
            padding: 5px 10px;
            font-family: inherit;
            font-size: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            letter-spacing: 0.3px;
        }
        .toggle button:hover { color: var(--text); }
        .toggle button.active { background: var(--neon-soft); color: var(--neon); }

        /* ── Layout ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 0 auto;
            padding: 120px 32px 80px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--neon);
            letter-spacing: 1.5px;
            margin-bottom: 28px;
            padding: 6px 14px;
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            background: var(--neon-soft);
        }
        .badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            font-size: clamp(32px, 5.5vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.2px;
            margin-bottom: 20px;
            color: var(--white);
        }
        h1 .gradient {
            background: linear-gradient(135deg, var(--neon) 0%, var(--neon2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lede {
            font-size: clamp(15px, 1.6vw, 17px);
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 48px;
            max-width: 640px;
        }

        /* ── Currency rows ── */
        .rows-wrap {
            display: flex;
            flex-direction: column;
            gap: 36px;
            margin-bottom: 40px;
        }

        /* Order is set by JS via .primary class — primary row appears first */
        .row { order: 2; }
        .row.primary { order: 1; }

        .row-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--dim);
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }
        .row-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .row.primary .row-label {
            color: var(--neon);
        }
        .row-label .sym {
            font-family: var(--display);
            font-size: 16px;
            color: inherit;
            margin-right: 4px;
        }

        .tiers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px;
        }

        .tier {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 20px;
            position: relative;
            transition: all 0.2s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
        }
        .tier:hover {
            border-color: var(--neon-line);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(217, 119, 87, 0.08);
        }

        .tier-icon { font-size: 22px; color: var(--neon); margin-bottom: 10px; }
        .tier-name {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .tier-amount {
            font-family: var(--display);
            font-size: 30px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
            line-height: 1;
        }
        .tier-amount .currency {
            font-size: 15px;
            color: var(--neon);
            margin-right: 4px;
            vertical-align: top;
            font-weight: 600;
        }
        .tier-desc {
            font-size: 12.5px;
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 14px;
            flex: 1;
        }
        .tier-net {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--dim);
            letter-spacing: 0.3px;
            padding-top: 10px;
            margin-bottom: 12px;
            border-top: 1px dashed var(--border);
        }
        .tier-net strong {
            color: var(--text);
            font-weight: 600;
        }
        .tier-btn {
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            color: var(--neon);
            border: 1px solid var(--neon-line);
            border-radius: 8px;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tier-btn:hover {
            background: var(--neon);
            color: var(--bg);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(217, 119, 87, 0.3);
        }
        .tier-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── WeChat QR card (4th card in CNY row) ── */
        .tier-wechat {
            align-items: center;
            justify-content: center;
        }
        .tier-wechat .qr-wrap {
            background: #ffffff;
            border-radius: 8px;
            padding: 6px;
            margin: 0 0 14px;
            box-shadow: 0 0 0 1px var(--border);
        }
        .tier-wechat .qr-wrap img {
            display: block;
            width: 150px;
            height: 150px;
            object-fit: contain;
        }
        .tier-wechat .qr-caption {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--text);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-align: center;
        }
        .tier-wechat.unavailable .qr-wrap { filter: grayscale(1); }
        .tier-wechat.unavailable .qr-caption { color: var(--dim); }

        /* ── Debug panel ── */
        .debug {
            margin-top: 60px;
            background: rgba(8, 8, 10, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 22px;
            font-family: var(--mono);
            font-size: 12px;
        }
        .debug-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .debug-title { color: var(--neon); font-weight: 600; letter-spacing: 1px; }
        .debug-env { color: var(--dim); font-size: 11px; }
        .debug-env .env-tag {
            color: var(--neon);
            background: var(--neon-soft);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .debug-env .env-tag.live {
            color: #ff5c5c;
            background: rgba(255, 92, 92, 0.12);
        }

        #event-log {
            max-height: 280px;
            overflow-y: auto;
            color: var(--text);
            font-size: 11px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #event-log .ev { padding: 4px 0; border-bottom: 1px dotted var(--border); }
        #event-log .ev:last-child { border-bottom: none; }
        #event-log .ev-name { color: var(--neon); font-weight: 600; }
        #event-log .ev-time { color: var(--dim); margin-right: 8px; }
        #event-log .placeholder { color: var(--dim); font-style: italic; }

        .footnote {
            margin-top: 40px;
            font-size: 12px;
            color: var(--dim);
            line-height: 1.8;
            font-family: var(--mono);
        }
        .footnote a { color: var(--neon); text-decoration: none; }
        .footnote a:hover { text-decoration: underline; }

        .footer-links {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }
        .footer-links a {
            color: var(--dim);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer-links a:hover { color: var(--neon); }

        .warn {
            display: none;
            margin-bottom: 24px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 92, 92, 0.25);
            background: rgba(255, 92, 92, 0.08);
            border-radius: 10px;
            color: #ffaaaa;
            font-size: 13px;
            font-family: var(--mono);
            line-height: 1.7;
        }
        .warn.show { display: block; }
        .warn strong { color: #ff7575; }

        @media (max-width: 640px) {
            .nav { padding: 12px 18px; }
            .nav-r { gap: 12px; }
            .nav-back { display: none; }
            .container { padding: 100px 18px 60px; }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow-orb"></div>

    <nav class="nav">
        <a href="../" class="nav-logo">
            <img src="../icon.png" alt="EchoBird">
            <span>EchoBird</span>
        </a>
        <div class="nav-r">
            <a href="../" class="nav-back" data-t="back">← 返回首页</a>
            <div class="toggle" id="lang-toggle">
                <button data-lang="zh-CN">中文</button>
                <button data-lang="en">EN</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <span class="badge">
            <span class="dot"></span>
            <span data-t="badge">支持这个项目</span>
        </span>

        <h1 data-t="h1"></h1>
        <p class="lede" data-t="lede"></p>

        <div id="warn" class="warn">
            <strong data-t="warn_strong">⚠️ 配置未就绪</strong> <span data-t="warn_body"></span>
        </div>

        <div class="rows-wrap">
            <!-- CNY 行(4 列:Coffee / Lunch / Feast / WeChat QR) -->
            <section class="row" data-currency="CNY">
                <h2 class="row-label">
                    <span class="sym">¥</span><span data-t="cny_label">人民币 · CNY</span>
                </h2>
                <div class="tiers">
                    <div class="tier" data-tier="coffee" data-currency="CNY">
                        <div class="tier-icon"><i class="fa-solid fa-mug-hot"></i></div>
                        <div class="tier-name" data-t="coffee_name">COFFEE</div>
                        <div class="tier-amount"><span class="currency">¥</span><span>18</span></div>
                        <div class="tier-desc" data-t="coffee_desc"></div>

                        <div class="tier-amount"><span class="currency">¥</span><span>38</span></div>
                        <div class="tier-desc" data-t="lunch_desc"></div>
                        <div class="tier-net"></div>

                    </div>
                    <div class="tier" data-tier="feast" data-currency="CNY">
                        <div class="tier-icon"><i class="fa-solid fa-champagne-glasses"></i></div>

                        <div class="tier-amount"><span class="currency">¥</span><span>88</span></div>
                        <div class="tier-desc" data-t="feast_desc"></div>
                        <div class="tier-net"></div>
                        <button class="tier-btn"></button>
                    </div>
                    <!-- 4th card: 微信赞赏码 — minimal: 只剩 QR + 4 字 caption -->
                    <div class="tier tier-wechat" data-tier-special="wechat">
                        <div class="qr-wrap">
                            <img src="./wechat-qr.png" alt="WeChat QR" />
                        </div>
                        <div class="qr-caption" data-t="wechat_caption">微信扫码</div>
                    </div>
                </div>
            </section>

            <!-- USD 行(3 列;海外用户无微信入口) -->
            <section class="row" data-currency="USD">
                <h2 class="row-label">
                    <span class="sym">$</span><span data-t="usd_label">US Dollar · 美元</span>
                </h2>
                <div class="tiers">
                    <div class="tier" data-tier="coffee" data-currency="USD">
                        <div class="tier-icon"><i class="fa-solid fa-mug-hot"></i></div>
                        <div class="tier-name" data-t="coffee_name">COFFEE</div>
                        <div class="tier-amount"><span class="currency">$</span><span>3</span></div>
                        <div class="tier-desc" data-t="coffee_desc"></div>
                        <div class="tier-net"></div>
                        <button class="tier-btn"></button>
                    </div>
                    <div class="tier" data-tier="lunch" data-currency="USD">
                        <div class="tier-icon"><i class="fa-solid fa-bowl-rice"></i></div>
                        <div class="tier-name" data-t="lunch_name">LUNCH</div>
                        <div class="tier-amount"><span class="currency">$</span><span>7</span></div>
                        <div class="tier-desc" data-t="lunch_desc"></div>
                        <div class="tier-net"></div>
                        <button class="tier-btn"></button>
                    </div>
                    <div class="tier" data-tier="feast" data-currency="USD">
                        <div class="tier-icon"><i class="fa-solid fa-champagne-glasses"></i></div>
                        <div class="tier-name" data-t="feast_name">FEAST</div>
                        <div class="tier-amount"><span class="currency">$</span><span>15</span></div>
                        <div class="tier-desc" data-t="feast_desc"></div>
                        <div class="tier-net"></div>
                        <button class="tier-btn"></button>
                    </div>
                </div>
            </section>
        </div>

        <section class="debug">
            <div class="debug-head">
                <span class="debug-title">PADDLE EVENT LOG</span>
                <span class="debug-env">
                    <span data-t="env_label">环境</span>: <span id="env-tag" class="env-tag">sandbox</span>
                </span>
            </div>
            <div id="event-log">
                <div class="placeholder" data-t="log_placeholder"></div>
            </div>
        </section>

        <p class="footnote" data-t="footnote"></p>

        <div class="footer-links">
            <a href="/legal/privacy/" data-t="link_privacy">隐私政策</a>
            <a href="/legal/refund/" data-t="link_refund">退款政策</a>
            <a href="/legal/terms/" data-t="link_terms">销售条款</a>
            <a href="mailto:hi@echobird.ai">hi@echobird.ai</a>
            <a href="https://github.com/edison7009/EchoBird/issues" target="_blank" rel="noopener">GitHub Issues</a>
        </div>
    </main>

    <script>
        // ╔══════════════════════════════════════════════════════════════════╗
        // ║  PADDLE 配置                                                       ║
        // ╚══════════════════════════════════════════════════════════════════╝
        const PADDLE_CONFIG = {
            environment: "production",
            clientToken: "live_a01b045f2acbe410186427d60d4",
            prices: {
                CNY: {
                    coffee: "pri_01ks8pty76vxv9n5tehyaf0mys",

            },
            amounts: {
                // `net` = approximate amount the dev actually receives after Paddle's

                    coffee: 18, lunch: 38, feast: 88, symbol: "¥",
                    net: { coffee: "13.70", lunch: "32.60", feast: "80.10" },
                },
                USD: {
                    coffee: 3, lunch: 7, feast: 15, symbol: "$",
                    net: { coffee: "1.96", lunch: "6.15", feast: "13.75" },
                },
            },
        };

        // ╔══════════════════════════════════════════════════════════════════╗
        // ║  双语文案                                                          ║
        // ╚══════════════════════════════════════════════════════════════════╝
        const I18N = {
            "zh-CN": {
                page_title: "支持 EchoBird · 打赏开发者",

                badge: "支持这个项目",
                h1: '请 EchoBird 团队<span class="gradient">喝杯咖啡</span>',
                lede: "EchoBird 是一个长期维护的独立项目。如果它帮你节省了时间,或者只是让你的 AI 工作流更顺手,欢迎用一杯咖啡的钱告诉团队:这事值得继续做。",

                cny_label: "人民币 · CNY",
                usd_label: "美元 · USD",
                coffee_name: "COFFEE",
                coffee_desc: "一杯咖啡。简单直接,谢谢支持。",
                lunch_name: "LUNCH",
                lunch_desc: "一顿便饭。让团队今天加个菜。",
                feast_name: "FEAST",
                feast_desc: "一顿好饭。EchoBird 会记得有人请客这件事。",
                tip_btn: (amount, symbol) => `打赏 ${symbol}${amount}`,
                env_label: "环境",
                log_placeholder: "等待 Paddle 事件…(点任一档位即可触发 checkout.loaded)",
                footnote: '支付由 <a href="https://paddle.com" target="_blank" rel="noopener">Paddle</a> 处理,EchoBird 不接触你的银行卡信息。Paddle 作为 Merchant of Record 代为处理税务。<br>打赏前请阅读 <a href="/legal/refund/">退款政策</a> 与 <a href="/legal/terms/">销售条款</a>。',
                link_privacy: "隐私政策",
                link_refund: "退款政策",
                link_terms: "销售条款",
                paddle_locale: "zh-Hans",
            },
            "en": {
                page_title: "Support EchoBird · Tip the developer",
                back: "← Back to home",
                badge: "SUPPORT THE PROJECT",
                h1: 'Buy the dev a <span class="gradient">cup of coffee</span>',
                lede: "EchoBird is a long-running indie project. If it has saved you time, or just made your AI workflow smoother, a small tip tells the maker this is worth continuing.",
                net_label: "Net to dev",
                wechat_caption: "WeChat · CN only",
                warn_strong: "⚠️ Configuration incomplete",
                warn_body: "Set the Client-side Token and Price IDs in PADDLE_CONFIG at the top of this file before testing.",
                cny_label: "CNY · 人民币",
                usd_label: "USD · 美元",
                coffee_name: "COFFEE",
                coffee_desc: "A coffee. Simple and direct. Thank you.",
                lunch_name: "LUNCH",
                lunch_desc: "A lunch. Helps the dev not pick the cheapest option today.",
                feast_name: "FEAST",
                feast_desc: "A proper meal. EchoBird will remember someone paid for dinner.",
                tip_btn: (amount, symbol) => `Tip ${symbol}${amount}`,
                env_label: "Env",
                log_placeholder: "Waiting for Paddle events… (click any tier to trigger checkout.loaded)",
                footnote: 'Payments are processed by <a href="https://paddle.com" target="_blank" rel="noopener">Paddle</a>. EchoBird never touches your card details. Paddle acts as Merchant of Record and handles all sales tax.<br>Before tipping, please read our <a href="/legal/refund/">Refund Policy</a> and <a href="/legal/terms/">Terms of Sale</a>.',
                link_privacy: "Privacy",
                link_refund: "Refund",
                link_terms: "Terms of Sale",
                paddle_locale: "en",
            },
        };

        // ╔══════════════════════════════════════════════════════════════════╗
        // ║  语言状态(货币不再是切换器,而是行)                                ║
        // ╚══════════════════════════════════════════════════════════════════╝
        const detectDefaultLang = () => {
            const stored = localStorage.getItem("eb_support_lang");
            if (stored === "zh-CN" || stored === "en") return stored;
            return (navigator.language || "en").toLowerCase().startsWith("zh") ? "zh-CN" : "en";
        };

        let currentLang = detectDefaultLang();

        // ╔══════════════════════════════════════════════════════════════════╗
        // ║  渲染                                                              ║
        // ╚══════════════════════════════════════════════════════════════════╝
        function render() {
            const t = I18N[currentLang];

            document.documentElement.lang = currentLang;
            document.title = t.page_title;

            // 翻译所有 data-t 节点
            document.querySelectorAll("[data-t]").forEach(el => {
                const key = el.dataset.t;
                const val = t[key];
                if (typeof val === "string") el.innerHTML = val;
            });

            // 主货币 = 中文→CNY,英文→USD;让 .primary 行排在前面
            const primaryCurrency = currentLang === "zh-CN" ? "CNY" : "USD";
            document.querySelectorAll(".row").forEach(row => {
                row.classList.toggle("primary", row.dataset.currency === primaryCurrency);
            });

            // 渲染 6 张 Paddle 卡的按钮文案 + 净收行
            document.querySelectorAll(".tier[data-tier]").forEach(card => {
                const currency = card.dataset.currency;
                const tier = card.dataset.tier;
                const amounts = PADDLE_CONFIG.amounts[currency];
                const amount = amounts[tier];
                const symbol = amounts.symbol;
                card.querySelector(".tier-btn").textContent = t.tip_btn(amount, symbol);
                const netEl = card.querySelector(".tier-net");
                if (netEl) {
                    netEl.innerHTML = `${t.net_label} <strong>${symbol}${amounts.net[tier]}</strong>`;
                }
            });

            // 微信赞赏卡:EN 模式下灰度 + caption 切到 "WeChat · CN only"
            const wechatCard = document.querySelector('.tier-wechat[data-tier-special="wechat"]');
            if (wechatCard) {
                wechatCard.classList.toggle("unavailable", currentLang === "en");
            }

            // Toggle 高亮
            document.querySelectorAll("#lang-toggle button").forEach(b => {
                b.classList.toggle("active", b.dataset.lang === currentLang);
            });
        }

        document.getElementById("lang-toggle").addEventListener("click", e => {
            const b = e.target.closest("button[data-lang]");
            if (!b) return;
            currentLang = b.dataset.lang;
            localStorage.setItem("eb_support_lang", currentLang);
            render();
        });

        // ╔══════════════════════════════════════════════════════════════════╗
        // ║  Paddle 初始化 + checkout                                          ║
        // ╚══════════════════════════════════════════════════════════════════╝
        const $log = document.getElementById("event-log");
        const $warn = document.getElementById("warn");
        const $envTag = document.getElementById("env-tag");

        function ts() { return new Date().toTimeString().slice(0, 8); }

        function logEvent(name, data) {
            const placeholder = $log.querySelector(".placeholder");
            if (placeholder) placeholder.remove();
            const row = document.createElement("div");
            row.className = "ev";
            const compact = data ? JSON.stringify(data, null, 0).slice(0, 200) : "";
            row.innerHTML =
                `<span class="ev-time">[${ts()}]</span>` +
                `<span class="ev-name">${name}</span>` +
                (compact ? `  ${compact}` : "");
            $log.prepend(row);
            console.log(`[Paddle] ${name}`, data || "");
        }

        function isPlaceholder(v) { return !v || v.includes("REPLACE_ME"); }

        function resolveSuccessUrl() {
            const proto = window.location.protocol;
            if (proto === "http:" || proto === "https:") {
                return window.location.origin + "/support/?status=success";
            }
            return "https://echobird.ai/support/?status=success";
        }

        const allPrices = [
            ...Object.values(PADDLE_CONFIG.prices.CNY),
            ...Object.values(PADDLE_CONFIG.prices.USD),
        ];
        const configReady =
            !isPlaceholder(PADDLE_CONFIG.clientToken) &&
            allPrices.every(p => !isPlaceholder(p));

        $envTag.textContent = PADDLE_CONFIG.environment;
        if (PADDLE_CONFIG.environment === "production") {
            $envTag.classList.add("live");
            // Debug log is for dev/testing — hide entirely from real users.
            const debugPanel = document.querySelector(".debug");
            if (debugPanel) debugPanel.style.display = "none";
        }

        if (!configReady) {
            $warn.classList.add("show");
            document.querySelectorAll(".tier-btn").forEach(b => b.disabled = true);
            console.warn("[Paddle] PADDLE_CONFIG 未填全 — 检查 clientToken 和 prices.CNY / prices.USD");
        } else {
            try {
                Paddle.Environment.set(PADDLE_CONFIG.environment);
                Paddle.Initialize({
                    token: PADDLE_CONFIG.clientToken,
                    eventCallback: (ev) => {
                        logEvent(ev.name, {
                            status: ev.data?.status,
                            total: ev.data?.totals?.total,
                            currency: ev.data?.currency_code,
                            txn: ev.data?.transaction_id,
                        });
                    },
                });
                logEvent("Paddle.Initialize", { env: PADDLE_CONFIG.environment });
            } catch (e) {
                logEvent("Paddle.Initialize FAILED", { error: String(e) });
                console.error(e);
            }
        }

        document.querySelectorAll(".tier-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const card = btn.closest(".tier");
                const tier = card.dataset.tier;
                const currency = card.dataset.currency;
                const priceId = PADDLE_CONFIG.prices[currency][tier];
                if (!priceId || isPlaceholder(priceId)) {
                    logEvent("checkout.skip", { reason: "priceId not set", tier, currency });
                    return;
                }
                logEvent("checkout.open", { tier, priceId, currency, lang: currentLang });
                Paddle.Checkout.open({
                    items: [{ priceId, quantity: 1 }],
                    settings: {
                        displayMode: "overlay",
                        theme: "dark",
                        locale: I18N[currentLang].paddle_locale,
                        showAddDiscounts: false,
                        showAddTaxId: false,
                        successUrl: resolveSuccessUrl(),
                    },
                });
            });
        });

        if (new URLSearchParams(window.location.search).get("status") === "success") {
            logEvent("checkout.success-redirect", { msg: "🙏" });
        }

        render();
    </script>
</body>

</html>
